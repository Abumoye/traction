<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify a certificate — ATH Academy</title>
<link rel="icon" type="image/png" href="favicon.png">
<meta property="og:title" content="Verify an ATH Academy certificate">
<meta property="og:description" content="Check whether a certificate number was genuinely issued by ATH Academy.">
<meta property="og:image" content="https://tolnigeria.com/ath-academy/og-card.png">
<meta property="og:type" content="website">
<link rel="stylesheet" href="styles.css">
<style>
  .verify-wrap { max-width: 560px; margin: 0 auto; padding: 80px 24px; }
  .verify-wrap h1 { font-family: var(--display); font-size: 28px; margin-bottom: 12px; }
  .verify-wrap p.sub { color: var(--muted); margin-bottom: 32px; }
  .verify-row { display: flex; gap: 12px; margin-bottom: 32px; }
  .verify-row input { flex: 1; }
  .result-box { border: 1px solid var(--line); padding: 24px; border-radius: var(--radius); display: none; }
  .result-box.show { display: block; }
  .result-box.valid { border-color: var(--success); }
  .result-box.invalid { border-color: var(--danger); }
  .result-box dl { display: grid; grid-template-columns: 140px 1fr; gap: 8px 16px; margin-top: 16px; font-size: 14px; }
  .result-box dt { color: var(--muted); }
  .result-box dd { font-family: var(--mono); }
</style>
</head>
<body>

<header class="site">
  <div class="wrap">
    <div class="wordmark"><img src="assets/ath-badge.png" alt="ATH Recruiters" style="height:32px; width:auto;"> ACADEMY</div>
  </div>
</header>

<div class="verify-wrap">
  <div class="eyebrow" style="font-family:var(--mono); font-size:12px; color:var(--orange); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:16px;">Public lookup</div>
  <h1>Verify a certificate</h1>
  <p class="sub">Every certificate ATH Academy issues gets a certificate number, logged the moment it's earned. Enter it below to confirm it's genuine.</p>

  <div class="verify-row">
    <input type="text" id="cert-input" placeholder="Certificate No. e.g. 100047">
    <button id="verify-btn">Check</button>
  </div>

  <div class="result-box" id="result-box">
    <div id="result-status"></div>
    <dl id="result-details"></dl>
  </div>
</div>

<script>
// SWAP FOR LIVE: replace this with a fetch to your Apps Script endpoint, e.g.
// const res = await fetch(APPS_SCRIPT_URL + "?action=verifyCertificate&id=" + id);
// const data = await res.json();
// Code.gs already ships a matching verifyCertificate() handler — see README.

const DEMO_CERTS = {
  "100047": { name: "Chidinma Okafor", memberCode: "ATH/FCT/120726/0143", course: "Handling Difficult Customers", date: "12 July 2026" }
};

async function verifyCert() {
  const id = document.getElementById('cert-input').value.trim();
  const box = document.getElementById('result-box');
  const status = document.getElementById('result-status');
  const details = document.getElementById('result-details');

  await new Promise(r => setTimeout(r, 200));
  const cert = DEMO_CERTS[id];

  box.classList.add('show');
  if (cert) {
    box.classList.remove('invalid'); box.classList.add('valid');
    status.innerHTML = '<strong style="color:var(--success)">Genuine ATH Academy certificate</strong>';
    details.innerHTML = `
      <dt>Certificate No.</dt><dd>${id}</dd>
      <dt>Issued to</dt><dd>${cert.name}</dd>
      <dt>Member code</dt><dd>${cert.memberCode}</dd>
      <dt>Course</dt><dd>${cert.course}</dd>
      <dt>Date issued</dt><dd>${cert.date}</dd>
    `;
  } else {
    box.classList.remove('valid'); box.classList.add('invalid');
    status.innerHTML = '<strong style="color:var(--danger)">No certificate found with that number</strong>';
    details.innerHTML = '';
  }
}

document.getElementById('verify-btn').addEventListener('click', verifyCert);
document.getElementById('cert-input').addEventListener('keydown', e => { if (e.key === 'Enter') verifyCert(); });

// Auto-check if arriving via a shared link like verify.html?id=100047
const params = new URLSearchParams(window.location.search);
if (params.get('id')) {
  document.getElementById('cert-input').value = params.get('id');
  verifyCert();
}
</script>
</body>
</html>
